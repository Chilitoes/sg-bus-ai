app = 'sg-bus-ai'
primary_region = 'sin'

[build]

[env]
  PORT = '8000'

# Persistent volume keeps the SQLite database across restarts/deploys.
# Create it once with: fly volumes create bus_data --size 1 --region sin
[[mounts]]
  source = 'bus_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/api/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
