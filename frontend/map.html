<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0e10" />
  <title>SG Bus — Stops near me</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d0e10; }
    #map { position: fixed; inset: 0; }
    #bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: .65rem 1rem calc(.65rem);
      padding-top: calc(.65rem + env(safe-area-inset-top));
      background: rgba(13,14,16,.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; gap: .75rem;
    }
    .bar-text { flex: 1; }
    .bar-title { font-size: .95rem; font-weight: 700; color: #eceef2; }
    .bar-hint  { font-size: .75rem; color: rgba(236,238,242,.45); margin-top: .12rem; }
    .close-btn {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.12);
      color: #eceef2; font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .12s;
    }
    .close-btn:active { background: rgba(255,255,255,.2); }
    /* Leaflet overrides */
    .leaflet-control-zoom { border: none !important; }
    .leaflet-control-zoom a {
      background: rgba(13,14,16,.88) !important;
      color: #eceef2 !important;
      border-color: rgba(255,255,255,.12) !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(40,42,50,.9) !important; }
    /* You tooltip */
    .you-label {
      background: #3b82f6; color: #fff; border: none; border-radius: 6px;
      font-size: .72rem; font-weight: 700; padding: 2px 7px;
      white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .leaflet-tooltip.you-label::before { display: none; }
  </style>
</head>
<body>

<div id="bar">
  <div class="bar-text">
    <div class="bar-title">Stops near me</div>
    <div class="bar-hint">Tap any stop to see live arrivals</div>
  </div>
  <button class="close-btn" onclick="window.close()" aria-label="Close">✕</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
"use strict";
const API_BASE = "";

const _map = L.map("map", { zoomControl: false, attributionControl: false })
              .setView([1.3521, 103.8198], 15);

L.tileLayer("https://www.onemap.gov.sg/maps/tiles/Night/{z}/{x}/{y}.png",
            { maxZoom: 18, minZoom: 11 }).addTo(_map);
L.control.zoom({ position: "bottomright" }).addTo(_map);

function selectStop(code) {
  // Navigate the opener (main SG Bus tab) to load this stop, then close this tab.
  const base = location.href.replace(/map\.html.*$/, "index.html");
  const url  = new URL(base);
  url.searchParams.set("loadStop", code);
  if (window.opener && !window.opener.closed) {
    window.opener.location.href = url.toString();
    window.close();
  } else {
    window.location.href = url.toString();
  }
}

function loadStops(lat, lng) {
  fetch(API_BASE + "/api/stops/nearby?lat=" + lat + "&lng=" + lng + "&limit=40")
    .then(r => r.json())
    .then(d => {
      (d.results || []).forEach(s => {
        if (!s.latitude) return;
        L.circleMarker([s.latitude, s.longitude], {
          radius: 9, color: "#fff", fillColor: "#e5282a",
          fillOpacity: 0.9, weight: 2,
        })
        .bindTooltip(s.description || s.bus_stop_code, {
          direction: "top", offset: [0, -10],
        })
        .on("click", () => selectStop(s.bus_stop_code))
        .addTo(_map);
      });
    })
    .catch(() => {});
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      _map.setView([lat, lng], 16);
      L.circleMarker([lat, lng], {
        radius: 10, color: "#fff", fillColor: "#3b82f6", fillOpacity: 1, weight: 2.5,
      })
      .bindTooltip("You", {
        permanent: true, direction: "top", offset: [0, -12], className: "you-label",
      })
      .addTo(_map);
      loadStops(lat, lng);
    },
    () => loadStops(1.3521, 103.8198)
  );
} else {
  loadStops(1.3521, 103.8198);
}
</script>
</body>
</html>
