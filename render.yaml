services:
  - type: web
    name: sg-bus-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LTA_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./bus_data.db
      - key: PYTHON_VERSION
        value: "3.11.0"
